<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生動画課題 - イベント別一覧</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .event-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            padding: 25px;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        .event-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .event-link-button {
            flex: 1;
            min-width: 120px;
            background-color: rgba(255, 255, 255, 0.25);
            border: 2px solid white;
            color: white;
            padding: 12px 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .event-link-button:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }
        
        .info-section {
            background-color: #ecf0f1;
            border-left: 4px solid #3498db;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        
        .info-section h2 {
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .info-section p {
            color: #34495e;
            line-height: 1.6;
        }
        
        .coming-soon {
            background-color: #ecf0f1;
            border-left: 4px solid #95a5a6;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            color: #7f8c8d;
        }
        
        .coming-soon h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .events-grid {
                grid-template-columns: 1fr;
            }
            
            .event-link-button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 学生動画課題ポータル</h1>
        <p class="subtitle">学校イベントの動画投稿一覧</p>
        
        <div class="info-section">
            <h2>📌 このページについて</h2>
            <p>学校で実施されるイベントの動画作成課題を通じて、学生の創造性と表現力を育成しています。各イベントごとに、学生たちが作成・投稿した動画一覧をご確認いただけます。</p>
        </div>
        
        <div class="events-grid">
            <!-- GW 2026 -->
            <div class="event-card">
                <div class="event-title">🌸 GW 2026</div>
                <div class="button-group">
                    <a href="https://mizuki-takeuchi-tibc.github.io/movie.github.io/tibcgw01.html" class="event-link-button">1年生</a>
                    <a href="https://mizuki-takeuchi-tibc.github.io/movie.github.io/tibcgw02.html" class="event-link-button">2年生</a>
                </div>
            </div>
            
            <!-- 今後のイベント -->
            <div class="coming-soon">
                <h3>🎓 新しいイベント追加予定</h3>
                <p>学校行事に応じて、随時新しい動画課題が追加されます</p>
            </div>
        </div>
    </div>
</body>
</html>
